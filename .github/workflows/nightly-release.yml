name: Electron Nightly Release
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'
  push:
    tags:
      - 'nightly-*'

permissions:
  contents: write

concurrency:
  group: electron-nightly-release
  cancel-in-progress: true

jobs:
  build-electron:
    name: Build Nightly Electron (${{ matrix.name }})
    timeout-minutes: 120
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            shell: bash
            arch: x64
            target_os: linux
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            shell: bash
            arch: arm64
            target_os: linux
          - name: Windows x64
            runner: windows-latest
            shell: pwsh
            arch: x64
            target_os: win
          - name: Windows arm64
            runner: windows-11-arm
            shell: pwsh
            arch: arm64
            target_os: win
          - name: macOS arm64
            runner: macos-15
            shell: bash
            arch: arm64
            target_os: mac

    env:
      BUILD_TARGET_OS: ${{ matrix.target_os }}
      BUILD_TARGET_ARCH: ${{ matrix.arch }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps
        with:
          shell: ${{ matrix.shell }}

      - name: Build web assets
        run: npm run build:web

      - name: Build Electron package
        run: node ./scripts/build-electron-ci.js

      - name: Upload Nightly release assets
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: electron-${{ matrix.target_os }}-${{ matrix.arch }}
          path: |
            packages/bruno-electron/out/**/*.AppImage
            packages/bruno-electron/out/**/*.dmg
            packages/bruno-electron/out/**/*.pkg
            packages/bruno-electron/out/**/*.zip
            packages/bruno-electron/out/**/*.exe
            packages/bruno-electron/out/**/*.blockmap
            packages/bruno-electron/out/latest*.yml
          if-no-files-found: error
          retention-days: 7

  publish-nightly:
    name: Publish nightly release
    runs-on: ubuntu-latest
    needs: build-electron
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: electron-*
          path: nightly-artifacts
          merge-multiple: true

      - name: Compute nightly metadata
        id: nightly
        shell: bash
        run: |
          stamp="$(date -u +%Y%m%d)"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="nightly-${stamp}-${GITHUB_RUN_NUMBER}"
          fi
          name="Nightly ${stamp}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.nightly.outputs.tag }}
          name: ${{ steps.nightly.outputs.name }}
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: nightly-artifacts/**/*
          body: |
            Automated nightly Electron build.

            Commit: ${{ github.sha }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}