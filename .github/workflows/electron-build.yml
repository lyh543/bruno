name: Electron Build
on:
  workflow_dispatch:
  push:
    branches: [main, lyh543-main, 'release/v*']

permissions:
  contents: write

jobs:
  compute-nightly-metadata:
    name: Compute nightly metadata
    runs-on: ubuntu-latest
    outputs:
      upstream_tag: ${{ steps.metadata.outputs.upstream_tag }}
      upstream_sha: ${{ steps.metadata.outputs.upstream_sha }}
      upstream_sha_short: ${{ steps.metadata.outputs.upstream_sha_short }}
      nightly_version: ${{ steps.metadata.outputs.nightly_version }}
      nightly_tag: ${{ steps.metadata.outputs.nightly_tag }}
      nightly_name: ${{ steps.metadata.outputs.nightly_name }}
    steps:
      - name: Resolve upstream version inputs
        id: metadata
        shell: bash
        run: |
          upstream_sha="$(git ls-remote https://github.com/usebruno/bruno.git HEAD | awk '{print $1}')"
          upstream_sha_short="${upstream_sha:0:8}"
          upstream_tag="$(git ls-remote --tags --sort=-version:refname https://github.com/usebruno/bruno.git 'v*' | grep -v '\^{}' | head -n1 | sed 's#.*refs/tags/##')"
          base_version="${upstream_tag#v}"
          build_date="$(date -u +%Y%m%d)"
          nightly_version="${base_version}-nightly.${build_date}.${upstream_sha_short}"
          nightly_tag="nightly-${build_date}-${GITHUB_RUN_NUMBER}"
          nightly_name="Nightly ${build_date} (${upstream_tag} / ${upstream_sha_short})"

          echo "upstream_tag=${upstream_tag}" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=${upstream_sha}" >> "$GITHUB_OUTPUT"
          echo "upstream_sha_short=${upstream_sha_short}" >> "$GITHUB_OUTPUT"
          echo "nightly_version=${nightly_version}" >> "$GITHUB_OUTPUT"
          echo "nightly_tag=${nightly_tag}" >> "$GITHUB_OUTPUT"
          echo "nightly_name=${nightly_name}" >> "$GITHUB_OUTPUT"

  build-electron:
    name: Build Electron (${{ matrix.name }})
    needs: compute-nightly-metadata
    timeout-minutes: 120
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            shell: bash
            arch: x64
            target_os: linux
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            shell: bash
            arch: arm64
            target_os: linux
          - name: Windows x64
            runner: windows-latest
            shell: pwsh
            arch: x64
            target_os: win
          - name: Windows arm64
            runner: windows-latest
            shell: pwsh
            arch: arm64
            target_os: win
          - name: macOS arm64
            runner: macos-15
            shell: bash
            arch: arm64
            target_os: mac

    env:
      BUILD_TARGET_OS: ${{ matrix.target_os }}
      BUILD_TARGET_ARCH: ${{ matrix.arch }}
      BRUNO_NIGHTLY_VERSION: ${{ needs.compute-nightly-metadata.outputs.nightly_version }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps
        with:
          shell: ${{ matrix.shell }}

      - name: Build web assets
        run: npm run build:web

      - name: Build Electron package
        run: node ./scripts/build-electron-ci.js

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: electron-${{ matrix.target_os }}-${{ matrix.arch }}
          path: |
            packages/bruno-electron/out/**/*.AppImage
            packages/bruno-electron/out/**/*.dmg
            packages/bruno-electron/out/**/*.pkg
            packages/bruno-electron/out/**/*.zip
            packages/bruno-electron/out/**/*.exe
            packages/bruno-electron/out/**/*.blockmap
            packages/bruno-electron/out/latest*.yml
          if-no-files-found: error
          retention-days: 14

  publish-nightly:
    name: Publish nightly release
    if: ${{ github.event_name == 'push' && github.ref_name == 'lyh543-main' }}
    runs-on: ubuntu-latest
    needs:
      - compute-nightly-metadata
      - build-electron
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: electron-*
          path: nightly-artifacts
          merge-multiple: true

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.compute-nightly-metadata.outputs.nightly_tag }}
          name: ${{ needs.compute-nightly-metadata.outputs.nightly_name }}
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            nightly-artifacts/**/*.AppImage
            nightly-artifacts/**/*_mac.dmg
            nightly-artifacts/**/*_win.exe
          body: |
            Automated nightly Electron build.

            Build version: `${{ needs.compute-nightly-metadata.outputs.nightly_version }}`
            Upstream tag: `${{ needs.compute-nightly-metadata.outputs.upstream_tag }}`
            Upstream commit: `${{ needs.compute-nightly-metadata.outputs.upstream_sha_short }}`
            Fork commit: `${{ github.sha }}`
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ## ⚠️ macOS Installation Notes ("App is damaged" or DMG won't open)

            If you are downloading the macOS builds (especially the `arm64` version), you might encounter issues where macOS claims the app is **"damaged"** or the `.dmg` file **fails to open/mount** upon double-clicking.

            This happens because these specialized CI builds are not digitally signed and notarized by an official Apple Developer account. It does **not** mean the files are corrupted.

            Please follow the solutions below to bypass these macOS restrictions:

            ### Fix 1: Fix "App is damaged and cannot be opened"
            If you successfully installed the app but see the "damaged" error when launching:

            1. Open your **Terminal** app.
            2. Run the following command (make sure to include the space at the end, but **do not press Enter yet**):

            ```bash
            sudo xattr -r -d com.apple.quarantine
            ```

            3. Drag and drop **Bruno.app** from your `Applications` folder into the Terminal window to auto-complete its path. It should look like this:

            ```bash
            sudo xattr -r -d com.apple.quarantine /Applications/Bruno.app
            ```

            4. Press **Enter** and type your Mac's login password (no characters will show while typing, just type it and hit Enter).
            5. Relaunch Bruno.

            ---

            ### Fix 2: If double-clicking the `.dmg` file does nothing

            If the `.dmg` file refuses to mount or open when double-clicked, the macOS Disk Image service might be unresponsive, or blocking the unverified file:

            **Option A: Force mount via Terminal (Recommended)**

            1. Open your **Terminal**.
            2. Type `hdiutil attach ` (with a trailing space), drag the downloaded `.dmg` file into the Terminal, and press **Enter**.
            3. Check your Finder's sidebar under **Locations** to see if the `Bruno` volume has appeared. If it did, drag the app into your `Applications` folder.

            **Option B: Restart the Disk Service**
            If all DMG files are unresponsive on your Mac, run this command in Terminal to restart the daemon:

            ```bash
            sudo killall -9 diskarbitrationd
            ```

            Wait 5 seconds, then double-click the `.dmg` file again.